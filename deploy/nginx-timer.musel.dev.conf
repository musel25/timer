# nginx vhost for timer.musel.dev
# Install on the server at /etc/nginx/sites-available/timer.musel.dev and
# symlink into /etc/nginx/sites-enabled/. Mirrors the math.musel.dev setup.

server {
    listen 80;
    listen [::]:80;
    server_name timer.musel.dev;

    # ACME http-01 challenge for Let's Encrypt — must stay reachable.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name timer.musel.dev;

    ssl_certificate     /etc/letsencrypt/live/timer.musel.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/timer.musel.dev/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # Allow importing backup JSON files.
    client_max_body_size 5m;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        auth_basic off;
    }

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
